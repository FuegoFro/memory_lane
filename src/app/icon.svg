<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Warm paper background -->
  <rect width="32" height="32" rx="8" fill="#f7f0e3"/>
  
  <!-- Terracotta 'sun' behind the peak -->
  <circle cx="21" cy="13" r="4.5" fill="#b14a2a"/>
  
  <!-- Landscape fill (extended to cover frame edges) -->
  <path d="M6 26V20L12 15L17 20L21 13L26 18V26H6Z" fill="#f7f0e3"/>
  
  <!-- Refined ink frame (32px viewbox, 18x18 frame centered = 7,7 to 25,25) -->
  <rect x="7" y="7" width="18" height="18" rx="1.5" stroke="#2b1e12" stroke-width="2.5"/>
  
  <!-- Landscape outline (clipped slightly by frame or exactly touching) -->
  <path d="M7 20L12 15L17 20L21 13L25 17.8" stroke="#2b1e12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
